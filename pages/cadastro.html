<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="../css/cadlogin.css">

   <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
</head>
<body>
  
    <div class="d-flex justify-content-center align-items-center vh-100">
    <div class="container rounded-2 shadow-sn px-3 py-3" style="max-width: 1000px;">
      
      <div class="row g-0 align-items-stretch shadow-lg rounded-2 overflow-hidden">

        <!--Carrosel-->
        
        <div class="col-lg-6 d-none d-lg-block">
  <div id="loginCarousel" class="carousel carousel-dark carousel slide h-100" data-bs-ride="carousel">
    
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#loginCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#loginCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#loginCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>

    <div class="carousel-inner h-100">
      <div class="carousel-item active h-100">
        <img src="../assets/images/slide1-login.png" class="d-block w-100 h-100 object-fit-cover" alt="Slide 1">
        <div class="carousel-caption">
         <!--<h5 class="fw-bold">Encontre novos produtos em nosso site</h5>--> 
        </div>
      </div>
      <div class="carousel-item h-100">
        <img src="../assets/images/slide2-login.png" class="d-block w-100 h-100 object-fit-cover" alt="Slide 2">
        <div class="carousel-caption">
           <!--<h5 class="fw-bold">Encontre novos produtos em nosso site</h5>--> 
        </div>
      </div>
      <div class="carousel-item h-100 ">
        <img src="../assets/images/slide3-login.png" class="d-block w-100 h-100 object-fit-cover" alt="Slide 3">
        <div class="carousel-caption">
           <!--<h5 class="fw-bold">Encontre novos produtos em nosso site</h5>--> 
        </div>
      </div>
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#loginCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Anterior</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#loginCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Próximo</span>
    </button>
  </div>
</div>

        <!--Forms-->

        <div class="col-lg-6 bg-forms d-flex align-items-center">
          <form  id="formCadastro" class="px-5 py-5 w-100 bg forms-login bg-white">
            <h1 class="text-dark fw-bold mb-2">Faça seu login</h1>
            <p class="text-dark small mb-5">
              Já possui conta? <a href="../index.html" class=" underlink">Login</a>
            </p>

            <div class="mb-3">
              <input type="email"  id="cadEmail" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3">
              <input type="password" id="cadSenha" class="form-control " placeholder="Insira sua senha" required>
            </div>

            <div class="mb-3">
              <input type="password" id="cadConfirmaSenha" class="form-control " placeholder="Confime sua senha" required>
            </div>

            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="checkPrivacy" required>
              <label class="form-check-label text-dark small" for="checkPrivacy">
                Eu aceito os <a href="#" class="underlink text-decoration-underline">termos de privacidade</a>
              </label>
            </div>

            <button type="submit" id="btnCadastrar" class="btn text-white w-100 py-2 fw-bold">Cadastrar</button>
          </form>
        </div>

      </div> </div>
  </div>


  <script src="../js/cadastro.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
